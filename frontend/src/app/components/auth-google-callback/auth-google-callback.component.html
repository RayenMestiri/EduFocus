<div class="oauth-callback-page">

  <!-- Animated background orbs (reuses auth page aesthetic) -->
  <div class="oauth-bg">
    <div class="oauth-orb oauth-orb--1"></div>
    <div class="oauth-orb oauth-orb--2"></div>
    <div class="oauth-orb oauth-orb--3"></div>
  </div>

  <div class="oauth-card">

    <!-- Loading State -->
    @if (status === 'loading') {
      <div class="oauth-loading">
        <!-- Google colors spinner -->
        <div class="oauth-spinner" aria-label="Connexion en cours">
          <svg viewBox="0 0 50 50" class="oauth-spinner-svg">
            <circle cx="25" cy="25" r="20" fill="none" stroke-width="4"
                    class="oauth-spinner-track"/>
            <circle cx="25" cy="25" r="20" fill="none" stroke-width="4"
                    stroke-linecap="round"
                    class="oauth-spinner-arc"/>
          </svg>
        </div>

        <!-- Google Logo -->
        <div class="oauth-google-logo">
          <svg viewBox="0 0 48 48" width="40" height="40">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
        </div>

        <h2 class="oauth-loading-title">Connexion Google…</h2>
        <p class="oauth-loading-sub">Finalisation de votre connexion EduFocus via Google. Veuillez patienter.</p>

        <!-- Progress bar animation -->
        <div class="oauth-progress-bar">
          <div class="oauth-progress-fill"></div>
        </div>
      </div>
    }

    <!-- Error State -->
    @if (status === 'error') {
      <div class="oauth-error">
        <div class="oauth-error-icon">
          <span class="material-icons">error_outline</span>
        </div>
        <h2 class="oauth-error-title">Connexion échouée</h2>
        <p class="oauth-error-message">{{ errorMessage }}</p>
        <p class="oauth-error-redirect">Redirection vers la page de connexion dans quelques secondes…</p>
        <div class="oauth-progress-bar">
          <div class="oauth-progress-fill oauth-progress-fill--error"></div>
        </div>
      </div>
    }

  </div>

</div>
