<div class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300 flex flex-col">
  
  <!-- Top Navigation Header -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200/50 dark:border-gray-800/50 shadow-sm transition-all duration-300">
    <div class="max-w-[1800px] w-[98%] lg:w-[94%] mx-auto px-4 py-3 flex items-center justify-between">
      
      <!-- Brand / Logo -->
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-md shadow-indigo-200 dark:shadow-none">
          <span class="material-icons text-white text-lg">school</span>
        </div>
        <div>
          <span class="font-extrabold text-lg bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent">EduFocus</span>
          <span class="ml-2 px-1.5 py-0.5 rounded bg-indigo-50 dark:bg-indigo-950 text-indigo-700 dark:text-indigo-400 text-[10px] font-bold uppercase tracking-wider">Study Hub</span>
        </div>
      </div>

      <!-- Action Items & Navigation links -->
      <div class="flex items-center gap-2">
        <!-- Back to Dashboard Link -->
        <a routerLink="/dashboard" class="px-3 py-1.5 rounded-xl bg-gray-50 hover:bg-gray-100 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 border border-gray-200/50 dark:border-gray-700 text-xs font-semibold flex items-center gap-1.5 transition-all shadow-sm">
          <span class="material-icons text-sm">home</span>
          <span class="hidden sm:inline">Dashboard</span>
        </a>

        <!-- Back to Planner Link -->
        <a routerLink="/planner" class="px-3 py-1.5 rounded-xl bg-gray-50 hover:bg-gray-100 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 border border-gray-200/50 dark:border-gray-700 text-xs font-semibold flex items-center gap-1.5 transition-all shadow-sm">
          <span class="material-icons text-sm">event</span>
          <span class="hidden sm:inline">Planner</span>
        </a>

        <!-- Divider -->
        <span class="h-5 w-[1px] bg-gray-200 dark:bg-gray-700 mx-1"></span>

        <!-- Dark Mode Toggle Button -->
        <button 
          (click)="themeService.toggleTheme()"
          type="button"
          class="p-2 rounded-xl bg-gray-50 hover:bg-gray-100 dark:bg-gray-800 dark:hover:bg-gray-700 border border-gray-200/50 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all shadow-sm"
          [title]="themeService.isDark() ? 'Mode clair' : 'Mode sombre'"
        >
          <span class="material-icons text-sm">{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</span>
        </button>
      </div>

    </div>
  </header>

  <!-- Form Content -->
  <div class="flex-1 flex justify-center items-center p-4 sm:p-6 md:p-8">
    <div class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-5 sm:p-8 border border-gray-100 dark:border-gray-700">
    <div class="flex items-center gap-4 mb-8">
      <a routerLink="/study-hub" class="p-2 bg-gray-100 dark:bg-gray-700 rounded-full text-gray-500 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </a>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
        {{ isEditing ? 'Edit Study Pack' : 'Create New Study Pack' }}
      </h1>
    </div>

    <form (ngSubmit)="save()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Title <span class="text-red-500">*</span></label>
        <input 
          type="text" 
          name="title"
          [(ngModel)]="form.title"
          required
          placeholder="e.g. Object Oriented Programming in Java"
          class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Subject <span class="text-red-500">*</span></label>
        <select 
          name="subject"
          [(ngModel)]="form.subject"
          class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
        >
          @for (sub of subjects; track sub.name) {
            <option [value]="sub.name">{{ sub.name }}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description</label>
        <textarea 
          name="description"
          [(ngModel)]="form.description"
          rows="4"
          placeholder="Brief description of what this pack covers..."
          class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
        ></textarea>
      </div>

      <div class="pt-4 flex justify-end gap-4">
        <a routerLink="/study-hub" class="px-6 py-3 rounded-xl font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">
          Cancel
        </a>
        <button 
          type="submit"
          [disabled]="!form.title || !form.subject"
          class="px-6 py-3 rounded-xl font-medium text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md shadow-indigo-200 dark:shadow-none"
        >
          {{ isEditing ? 'Save Changes' : 'Create Pack' }}
        </button>
      </div>

    </form>
  </div>
</div>
</div>
