<div class="reset-page">
  <div class="reset-bg"></div>

  <div class="reset-card">
    <a routerLink="/login" class="reset-back">
      <span class="material-icons">arrow_back</span>
      Retour connexion
    </a>

    <div class="reset-head">
      <span class="badge">EduFocus Security</span>
      <h1>Nouveau mot de passe</h1>
      <p>Créez un mot de passe sécurisé pour continuer votre expérience premium.</p>
    </div>

    @if (!isSuccess) {
      <form class="reset-form" (ngSubmit)="submit()">
        <label>Nouveau mot de passe</label>
        <div class="input-wrap">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Nouveau mot de passe" autocomplete="new-password" />
          <button type="button" (click)="showPassword = !showPassword">
            <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>

        <label>Confirmer le mot de passe</label>
        <div class="input-wrap">
          <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirmez le mot de passe" autocomplete="new-password" />
          <button type="button" (click)="showConfirmPassword = !showConfirmPassword">
            <span class="material-icons">{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>

        <button class="btn-submit" type="submit" [disabled]="isLoading">
          @if (isLoading) {
            <span class="material-icons spin">hourglass_top</span>
            Mise à jour...
          } @else {
            <span class="material-icons">lock_reset</span>
            Mettre à jour le mot de passe
          }
        </button>
      </form>
    }
  </div>
</div>
